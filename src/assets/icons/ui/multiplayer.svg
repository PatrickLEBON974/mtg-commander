  <!-- Wifi-like signal -->
  <path d="M14 26a4 4 0 0 1 4 0" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M12 28.5a7 7 0 0 1 8 0" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
</svg>
