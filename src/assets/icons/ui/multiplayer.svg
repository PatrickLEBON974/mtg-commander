<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="currentColor">
  <!-- Multiplayer — Connected players -->
  <!-- Player 1 -->
  <circle cx="10" cy="10" r="4"/>
  <path d="M4 22a6 6 0 0 1 12 0v1H4z"/>
  <!-- Player 2 -->
  <circle cx="22" cy="10" r="4"/>
