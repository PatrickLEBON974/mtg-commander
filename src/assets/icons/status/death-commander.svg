<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="currentColor">
  <!-- Death by commander damage (21) — Crossed swords -->
  <!-- Sword 1 (top-left to bottom-right) -->
  <rect x="6" y="6" width="52" height="4" rx="1" transform="rotate(45 32 32)"/>
  <rect x="6" y="6" width="12" height="4" rx="1" transform="rotate(45 32 32) translate(0 -5)"/>
  <rect x="6" y="6" width="12" height="4" rx="1" transform="rotate(45 32 32) translate(0 5)"/>
  <!-- Simplified: two diagonal crossed swords -->
  <line x1="8" y1="8" x2="56" y2="56" stroke="currentColor" stroke-width="4" stroke-linecap="round"/>
  <line x1="56" y1="8" x2="8" y2="56" stroke="currentColor" stroke-width="4" stroke-linecap="round"/>
  <!-- Sword guards -->
  <line x1="14" y1="22" x2="22" y2="14" stroke="currentColor" stroke-width="4" stroke-linecap="round"/>
  <line x1="42" y1="14" x2="50" y2="22" stroke="currentColor" stroke-width="4" stroke-linecap="round"/>
  <!-- Sword pommels -->
  <circle cx="8" cy="8" r="4"/>
  <circle cx="56" cy="8" r="4"/>
  <!-- "21" text in center -->
  <circle cx="32" cy="32" r="12" fill="#1a1a2e"/>
  <text x="32" y="37" text-anchor="middle" font-size="14" font-weight="bold" font-family="system-ui" fill="currentColor">21</text>
</svg>
