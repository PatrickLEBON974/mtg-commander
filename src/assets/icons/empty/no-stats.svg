<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Empty state — No stats yet — Trophy outline -->
  <defs>
    <linearGradient id="trophy-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#CBAC5E" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#CBAC5E" stop-opacity="0.05"/>
    </linearGradient>
  </defs>
  <!-- Trophy cup -->
  <path d="M65 40h70v10c0 30-15 50-35 55-20-5-35-25-35-55V40z" fill="url(#trophy-grad)" stroke="#CBAC5E" stroke-width="1.5" opacity="0.6"/>
  <!-- Handles -->
  <path d="M65 50H50a15 15 0 0 0 15 25" fill="none" stroke="#CBAC5E" stroke-width="1.5" opacity="0.4"/>
  <path d="M135 50h15a15 15 0 0 1-15 25" fill="none" stroke="#CBAC5E" stroke-width="1.5" opacity="0.4"/>
  <!-- Stem -->
  <rect x="94" y="105" width="12" height="20" rx="2" fill="#CBAC5E" opacity="0.2" stroke="#CBAC5E" stroke-width="1" stroke-opacity="0.4"/>
  <!-- Base -->
  <rect x="78" y="125" width="44" height="8" rx="3" fill="#CBAC5E" opacity="0.15" stroke="#CBAC5E" stroke-width="1" stroke-opacity="0.4"/>
  <!-- Star on trophy -->
  <polygon points="100,55 103,65 113,66 106,72 108,82 100,77 92,82 94,72 87,66 97,65" fill="none" stroke="#CBAC5E" stroke-width="1" opacity="0.5"/>
  <!-- Dashed lines (no data) -->
  <line x1="60" y1="155" x2="140" y2="155" stroke="#CBAC5E" stroke-width="1" stroke-dasharray="6 4" opacity="0.2"/>
  <line x1="70" y1="165" x2="130" y2="165" stroke="#CBAC5E" stroke-width="1" stroke-dasharray="6 4" opacity="0.15"/>
  <text x="100" y="185" text-anchor="middle" font-size="12" font-family="system-ui" fill="#CBAC5E" opacity="0.5">Pas encore de stats</text>
</svg>
