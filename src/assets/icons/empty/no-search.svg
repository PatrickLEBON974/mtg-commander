<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Empty state — Search for cards — Magnifying glass over card -->
  <defs>
    <linearGradient id="search-card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e2a4a"/>
      <stop offset="100%" stop-color="#0f1628"/>
    </linearGradient>
  </defs>
  <!-- Card -->
  <rect x="55" y="50" width="70" height="100" rx="6" fill="url(#search-card)" stroke="#2a3a5e" stroke-width="1.5"/>
  <!-- Card art area -->
  <rect x="62" y="58" width="56" height="35" rx="3" fill="#2a3a5e" opacity="0.5"/>
  <!-- Card text lines -->
  <line x1="62" y1="102" x2="118" y2="102" stroke="#2a3a5e" stroke-width="2" stroke-linecap="round"/>
  <line x1="62" y1="110" x2="105" y2="110" stroke="#2a3a5e" stroke-width="2" stroke-linecap="round"/>
  <line x1="62" y1="118" x2="112" y2="118" stroke="#2a3a5e" stroke-width="2" stroke-linecap="round"/>
  <line x1="62" y1="126" x2="90" y2="126" stroke="#2a3a5e" stroke-width="2" stroke-linecap="round"/>
  <!-- Magnifying glass overlay -->
  <circle cx="120" cy="65" r="22" fill="none" stroke="#CBAC5E" stroke-width="3" opacity="0.7"/>
  <line x1="136" y1="81" x2="152" y2="97" stroke="#CBAC5E" stroke-width="4" stroke-linecap="round" opacity="0.7"/>
  <!-- Sparkle in lens -->
  <circle cx="112" cy="58" r="3" fill="#CBAC5E" opacity="0.3"/>
  <text x="100" y="180" text-anchor="middle" font-size="12" font-family="system-ui" fill="#CBAC5E" opacity="0.5">Rechercher une carte</text>
</svg>
