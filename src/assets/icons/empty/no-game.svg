<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Empty state — No game in progress — Stylized card deck -->
  <defs>
    <linearGradient id="card-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e2a4a"/>
      <stop offset="100%" stop-color="#0f1628"/>
    </linearGradient>
  </defs>
  <!-- Stacked cards (back view) -->
  <rect x="52" y="38" width="80" height="112" rx="8" fill="#16213e" stroke="#2a3a5e" stroke-width="1.5" transform="rotate(-8 92 94)"/>
  <rect x="56" y="36" width="80" height="112" rx="8" fill="#1a2844" stroke="#2a3a5e" stroke-width="1.5" transform="rotate(-3 96 92)"/>
  <rect x="60" y="34" width="80" height="112" rx="8" fill="url(#card-bg)" stroke="#CBAC5E" stroke-width="1.5"/>
  <!-- Card back design -->
  <rect x="68" y="42" width="64" height="96" rx="4" fill="none" stroke="#CBAC5E" stroke-width="0.8" opacity="0.4"/>
  <!-- Oval in center -->
  <ellipse cx="100" cy="90" rx="22" ry="30" fill="none" stroke="#CBAC5E" stroke-width="1" opacity="0.5"/>
  <!-- Inner diamond -->
  <polygon points="100,68 116,90 100,112 84,90" fill="none" stroke="#CBAC5E" stroke-width="0.8" opacity="0.3"/>
  <!-- Five dots (mana colors) in center -->
  <circle cx="100" cy="78" r="3" fill="#F9FAF4" opacity="0.6"/>
  <circle cx="109" cy="84" r="3" fill="#0E68AB" opacity="0.6"/>
  <circle cx="106" cy="96" r="3" fill="#150B00" stroke="#555" stroke-width="0.3" opacity="0.6"/>
  <circle cx="94" cy="96" r="3" fill="#D3202A" opacity="0.6"/>
  <circle cx="91" cy="84" r="3" fill="#00733E" opacity="0.6"/>
  <!-- Decorative sparkles -->
  <circle cx="40" cy="60" r="1.5" fill="#CBAC5E" opacity="0.3"/>
  <circle cx="160" cy="50" r="1" fill="#CBAC5E" opacity="0.2"/>
  <circle cx="150" cy="140" r="1.5" fill="#CBAC5E" opacity="0.25"/>
  <circle cx="45" cy="130" r="1" fill="#CBAC5E" opacity="0.15"/>
  <!-- Text area indicator -->
  <text x="100" y="170" text-anchor="middle" font-size="12" font-family="system-ui" fill="#CBAC5E" opacity="0.5">Aucune partie</text>
</svg>
